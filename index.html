<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StockFlow – Gestion de Stock</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📦</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <!-- SheetJS (Excel export) -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <!-- jsPDF + AutoTable (PDF export) -->
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
</head>
<body>

<!-- ===== APP SHELL ===== -->
<div class="app" id="app">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="logo">
      <div class="logo-icon">📦</div>
      <div>
        <h1>StockFlow</h1>
        <span id="company-name-display">Mon Entreprise</span>
      </div>
    </div>
    <nav class="nav">
      <div class="nav-item active" data-page="dashboard" onclick="showPage('dashboard')">
        <span class="nav-icon">🏠</span><span class="nav-label">Tableau de bord</span>
      </div>
      <div class="nav-item" data-page="products" onclick="showPage('products')">
        <span class="nav-icon">📦</span><span class="nav-label">Produits</span>
      </div>
      <div class="nav-item" data-page="stock" onclick="showPage('stock')">
        <span class="nav-icon">🗄️</span><span class="nav-label">Stock</span>
        <span class="badge" id="alert-badge" style="display:none">0</span>
      </div>
      <div class="nav-item" data-page="sales" onclick="showPage('sales')">
        <span class="nav-icon">💰</span><span class="nav-label">Ventes</span>
      </div>
      <div class="nav-item" data-page="reports" onclick="showPage('reports')">
        <span class="nav-icon">📊</span><span class="nav-label">Rapports</span>
      </div>
      <div class="nav-item" data-page="settings" onclick="showPage('settings')">
        <span class="nav-icon">⚙️</span><span class="nav-label">Paramètres</span>
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="sync-status" id="sync-status">
        <span class="sync-dot"></span>
        <span id="sync-label">Connecté</span>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <button class="menu-toggle" id="menu-toggle" onclick="toggleSidebar()">☰</button>
      <h2 id="page-title">Tableau de bord</h2>
      <div class="topbar-right">
        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input type="text" id="global-search" placeholder="Rechercher produit..." oninput="onSearch(this.value)" />
        </div>
        <button class="btn btn-primary" id="main-action-btn" onclick="openAddProduct()">
          <span>+</span> Produit
        </button>
      </div>
    </div>

    <!-- Loading overlay -->
    <div class="loading-overlay" id="loading-overlay">
      <div class="spinner"></div>
      <span>Chargement...</span>
    </div>

    <!-- Page content -->
    <div class="content" id="main-content">
      <!-- Rendered by JS -->
    </div>
  </div>
</div>

<!-- ===== MODAL ===== -->
<div class="modal-bg" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal-box" id="modal-inner"></div>
</div>

<!-- ===== TOAST ===== -->
<div class="toast-container" id="toast-container"></div>

<script src="script.js"></script>
</body>
</html>
